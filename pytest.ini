[pytest]
# Pytest Konfiguration für Lead Crawler

# Test-Verzeichnisse
testpaths = tests

# Marker für verschiedene Test-Typen
markers =
    unit: Unit Tests (keine externen Dienste)
    integration: Integration Tests (erfordern externe Dienste wie Ollama)
    slow: Langsame Tests
    wko: Echte WKO Crawler Tests
    ollama: Echte Ollama LLM Tests

# Standard-Optionen
addopts = -v --tb=short

# Ignorierte Verzeichnisse
norecursedirs = .git .venv venv node_modules

# Python-Dateien
python_files = test_*.py *_test.py

# Python-Klassen
python_classes = Test*

# Python-Funktionen
python_functions = test_*

# Filter-Warnungen
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage-Konfiguration (falls pytest-cov installiert)
# --cov=lead_crawler --cov-report=term-missing --cov-report=html